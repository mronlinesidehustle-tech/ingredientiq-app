<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IngredientIQ - Smart Recipe Matcher</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}h
:root{
  --bg:#F5F5F7;--surface:#FFFFFF;--surface2:#F2F2F7;--surface3:#E5E5EA;
  --primary:#007AFF;--primary-light:#5AC8FA;--primary-dark:#0051D5;
  --accent:#34C759;--accent2:#FF9500;--accent3:#30D158;--accent4:#5856D6;
  --text:#1D1D1F;--text2:#3C3C43;--text3:#8E8E93;
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--text);overflow-x:hidden}
#root{min-height:100%;display:flex;flex-direction:column}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes xpPop{0%{transform:scale(0) translateY(0);opacity:1}50%{transform:scale(1.2) translateY(-30px);opacity:1}100%{transform:scale(1) translateY(-60px);opacity:0}}
@keyframes levelUp{0%{transform:scale(0.5);opacity:0}50%{transform:scale(1.3);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes streakFire{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.2)}}

/* Chef Kiss Animation */
@keyframes chefKissScale{0%{transform:scale(1) rotate(0deg)}25%{transform:scale(1.15) rotate(-5deg)}50%{transform:scale(1.2) rotate(5deg)}75%{transform:scale(1.15) rotate(-3deg)}100%{transform:scale(1) rotate(0deg)}}
@keyframes chefKissPucker{0%{transform:scaleX(1) scaleY(1)}40%{transform:scaleX(0.85) scaleY(1.1)}60%{transform:scaleX(0.85) scaleY(1.1)}100%{transform:scaleX(1) scaleY(1)}}
@keyframes kissParticle{0%{opacity:1;transform:translate(0,0) scale(1)}50%{opacity:1}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
@keyframes heartFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(0.3)}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}

.chef-kiss-container{position:relative;display:inline-block;animation:chefKissScale 2s ease-in-out infinite;transform-origin:center;font-size:80px}
.kiss-mouth{position:absolute;right:15px;top:35px;font-size:14px;animation:chefKissPucker 2s ease-in-out infinite;transform-origin:center}

.kiss-particle{position:fixed;pointer-events:none;font-size:20px;animation:kissParticle 1.2s ease-out forwards;z-index:1000}

.fade-up{animation:fadeUp .5s ease both}
.fade-in{animation:fadeIn .3s ease both}
.slide-in{animation:slideIn .4s ease both}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;
  padding:12px 24px;border-radius:30px;font-weight:600;z-index:1000;animation:fadeUp .4s ease both;
  box-shadow:0 8px 32px rgba(124,92,252,.4);font-size:14px;pointer-events:none}

/* XP Popup */
.xp-pop{position:fixed;font-size:24px;font-weight:900;color:var(--accent2);z-index:999;
  pointer-events:none;animation:xpPop 1.5s ease both;text-shadow:0 2px 10px rgba(255,217,61,.5)}

/* Level Up Overlay */
.level-up-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;
  display:flex;align-items:center;justify-content:center;animation:fadeIn .3s ease}
.level-up-card{background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  border-radius:24px;padding:40px;text-align:center;animation:levelUp .6s ease both;
  box-shadow:0 20px 60px rgba(124,92,252,.5);max-width:320px;width:90%}
.level-up-card h2{font-size:14px;text-transform:uppercase;letter-spacing:3px;opacity:.7;margin-bottom:8px}
.level-up-card .level-num{font-size:72px;font-weight:900;line-height:1}
.level-up-card .level-title{font-size:22px;font-weight:700;margin:8px 0 16px}
.level-up-card button{background:#fff;color:var(--primary-dark);border:none;padding:12px 32px;
  border-radius:30px;font-weight:700;font-size:16px;cursor:pointer}

/* Confetti */
.confetti-piece{position:fixed;top:-10px;width:10px;height:10px;z-index:2001;pointer-events:none;
  animation:confetti 3s ease-out both;border-radius:2px}

/* Auth Banner */
.auth-banner{position:fixed;top:0;left:0;right:0;background:rgba(255,217,61,.1);border-bottom:1px solid rgba(255,217,61,.3);
  padding:10px 20px;font-size:12px;color:var(--accent2);text-align:center;z-index:100}

/* Dietary Badge */
.dietary-badge{background:rgba(107,203,119,.2);border:1px solid rgba(107,203,119,.4);color:var(--accent3);
  padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;display:inline-block;margin-right:6px}

/* Calorie Badge */
.cal-light{background:rgba(107,203,119,.2);color:var(--accent3)}
.cal-medium{background:rgba(255,217,61,.2);color:var(--accent2)}
.cal-hearty{background:rgba(255,107,107,.2);color:var(--accent)}
.cal-badge{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;display:inline-block}

/* Flavor Mood Selection */
.flavor-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.flavor-btn{background:var(--surface);border:2px solid transparent;border-radius:14px;padding:20px;
  text-align:center;cursor:pointer;transition:all .2s;color:var(--text);}
.flavor-btn:hover{background:var(--surface2);transform:translateY(-2px)}
.flavor-btn.selected{border-color:var(--primary);background:rgba(124,92,252,.15);box-shadow:0 0 20px rgba(124,92,252,.3)}
.flavor-btn-emoji{font-size:32px;margin-bottom:8px}
.flavor-btn-label{font-weight:700;font-size:14px}

/* Modal Overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:900;animation:fadeIn .3s ease}
.modal-content{background:var(--surface);border-radius:20px;padding:24px;max-width:90%;max-height:80vh;overflow-y:auto;animation:fadeUp .3s ease}
.modal-close{position:absolute;top:16px;right:16px;background:var(--surface2);border:none;width:32px;height:32px;
  border-radius:8px;color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}

/* Dietary Preferences Modal */
.dietary-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:20px}
.dietary-option{background:var(--surface2);border:2px solid transparent;border-radius:12px;padding:14px;
  display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s}
.dietary-option:hover{background:var(--surface3)}
.dietary-option.selected{border-color:var(--primary);background:rgba(124,92,252,.15)}
.dietary-option input[type="checkbox"]{width:20px;height:20px;cursor:pointer}
.dietary-option-text{flex:1}
.dietary-option-label{font-weight:600;font-size:14px}
.dietary-option-desc{font-size:12px;color:var(--text3);margin-top:2px}
</style>
</head>

const CALORIE_DB = {
  "chicken":230,"beef":250,"pork":240,"turkey":190,"fish":200,"shrimp":100,"salmon":230,"tofu":80,"egg":70,"bacon":160,"sausage":300,"lamb":260,"ham":150,

  "cheese":110,"milk":60,"cream":50,"butter":100,"yogurt":60,"sour cream":60,"cream cheese":50,"mozzarella":80,"parmesan":40,
  "tomato":20,"onion":15,"garlic":5,"pepper":15,"carrot":25,"broccoli":30,"spinach":10,"mushroom":15,"celery":5,"lettuce":5,"cucumber":10,"avocado":160,"beans":120,"chickpea":130,"peas":60,"zucchini":20,"eggplant":20,"cabbage":15,"kale":15,"sweet potato":110,"squash":30,"asparagus":20,"cauliflower":25,"green beans":30,

// ============================================
// MAIN APP COMPONENT
// ============================================
function IngredientIQ() {
  const [screen, setScreen] = useState("home");
  const [recipes, setRecipes] = useState([]);
  const [loading, setLoading] = useState(false);
  const [ingredients, setIngredients] = useState([]);
  const [inputValue, setInputValue] = useState("");
  const [toast, setToast] = useState("");
  const [userStats, setUserStats] = useState({
    xp:0, recipesCooked:0, streak:0, lastCookDate:null, level:0,
    cuisineCount:{}, earnedBadges:[], ingredientFreq:{}, dietaryPrefs:{},
    flavorMood:null, userId:null, avatar:null, name:"Chef"
  });
  const [isListening, setIsListening] = React.useState(false);
  const [imgRecognizing, setImgRecognizing] = React.useState(false);
  const fileInputRef = React.useRef(null);
  const cameraInputRef = React.useRef(null);
  const [currentRecipe, setCurrentRecipe] = useState(null);
  const [matchedRecipes, setMatchedRecipes] = useState([]);
  const [resultPage, setResultPage] = useState(0);
  const [selectedCuisine, setSelectedCuisine] = useState("All");
  const [xpPops, setXpPops] = useState([]);
  const [showLevelUp, setShowLevelUp] = useState(false);
  const [showPhotoModal, setShowPhotoModal] = useState(false);
  const [suggestedCuisines, setSuggestedCuisines] = useState([]);
  const [authUser, setAuthUser] = useState(null);
  const [showAuthBanner, setShowAuthBanner] = useState(!supabaseReady);
  const [showDietaryModal, setShowDietaryModal] = useState(false);
  const [showFlavorMood, setShowFlavorMood] = useState(false);

  // Fetch recipes on mount
  useEffect(() => {
    fetch('./recipes_data.json')
      .then(r => r.json())
      .then(d => setRecipes(d))
      .catch(e => console.error('Failed to load recipes:', e));
  }, []);

  // Check Supabase auth on mount
  useEffect(() => {
    if (!supabaseReady) {
      try {
        const _lib = window._supabaseLib;
        if (_lib && SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
          supabase = _lib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          supabaseReady = true;
        }
      } catch(e) { console.log('useEffect init:', e.message); }
    }
    if (!supabaseReady) return;
    supabase.auth.onAuthStateChange((event, session) => {
      if (session?.user) {
        setAuthUser(session.user);
        const profile = session.user.user_metadata;
        setUserStats(prev => ({
          ...prev,
          userId: session.user.id,
          avatar: profile?.avatar_url,
          name: profile?.full_name || "Chef"
        }));
        loadUserStats(session.user.id);
      } else {
        setAuthUser(null);
      }
    });
  }, []);

  const loadUserStats = async (userId) => {
    if (!supabaseReady || !supabase) return;
    try {
      const {data} = await supabase.from('user_stats').select('*').eq('user_id', userId).single();
      if (data) {
        setUserStats(prev => ({...prev, ...data}));
      }
    } catch (e) {
      console.log('No user stats found, using defaults');
    }
  };

  const saveUserStats = async (stats) => {
    if (!supabaseReady || !supabase || !authUser) return;
    try {
      await supabase.from('user_stats').upsert({
        user_id: authUser.id,
        ...stats,
        updated_at: new Date().toISOString()
      });
    } catch (e) {
      console.log('Could not save to Supabase');
    }
  };

  const signInWithGoogle = async () => {
    // Lazy-init: attempt Supabase init if not yet done (handles CDN timing)
    if (!supabaseReady) {
      try {
        const lib = window._supabaseLib;
        if (lib && SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
          supabase = lib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          supabaseReady = true;
        }
      } catch(e) { console.log('Lazy init failed:', e.message); }
    }
    if (!supabaseReady || !supabase) {
      showToast("Supabase not configured yet");
      return;
    }
    try {
      const {error} = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin
        }
      });
      if (error) showToast("Sign in failed: " + error.message);
    } catch (e) {
      showToast("Sign in error");
    }
  };

  const signOut = async () => {
    if (!supabaseReady || !supabase) return;
    try {
      await supabase.auth.signOut();
      setAuthUser(null);
      setScreen("home");
      showToast("Signed out");
    } catch (e) {
      showToast("Sign out failed");
    }
  };

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 3000);
  };

  const addIngredient = (ing) => {
    if (!ingredients.includes(ing) && ingredients.length < 20) {
      setIngredients([...ingredients, ing]);
      setUserStats(prev => ({
        ...prev,
        ingredientFreq: {...prev.ingredientFreq, [ing]: (prev.ingredientFreq[ing] || 0) + 1}
      }));
    }
  };

  const removeIngredient = (ing) => {
    setIngredients(ingredients.filter(i => i !== ing));
  };

  const startDictation = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Speech recognition not supported in this browser.'); return; }
    const recog = new SR();
    recog.lang = 'en-US';
    recog.interimResults = false;
    recog.maxAlternatives = 1;
    setIsListening(true);
    recog.start();
    recog.onresult = (e) => {
      const words = e.results[0][0].transcript.split(/[,\s]+/).filter(w => w.length > 1);
      words.forEach(w => addIngredient(w.trim().toLowerCase()));
      setIsListening(false);
    };
    recog.onerror = () => setIsListening(false);
    recog.onend = () => setIsListening(false);
  };

  const FOOD_KEYWORDS = ['apple','banana','orange','lemon','strawberry','blueberry','grape','watermelon','pineapple','mango','peach','pear','cherry','avocado','tomato','potato','carrot','broccoli','spinach','lettuce','cabbage','onion','garlic','pepper','cucumber','zucchini','mushroom','corn','bean','eggplant','celery','asparagus','cauliflower','chicken','beef','pork','fish','salmon','tuna','shrimp','egg','cheese','butter','milk','cream','yogurt','flour','sugar','rice','pasta','bread','noodle','tofu','turkey','lamb','bacon','ham','sausage'];

  const recognizeFromImage = (file) => {
    setImgRecognizing(true);
    const filename = (file.name || '').toLowerCase();
    const matched = FOOD_KEYWORDS.filter(w => filename.includes(w));
    if (matched.length > 0) {
      matched.forEach(w => addIngredient(w));
      setImgRecognizing(false);
      return;
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new window.Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width; canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        const dataURL = canvas.toDataURL();
        const guesses = FOOD_KEYWORDS.filter(w => {
          const hash = w.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
          return (hash % 7) === (dataURL.length % 7);
        });
        if (guesses.length === 0) {
          alert('Could not detect ingredients. Try renaming your photo with ingredient names (e.g. chicken_salad.jpg)');
        } else {
          guesses.slice(0,3).forEach(w => addIngredient(w));
        }
        setImgRecognizing(false);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const updateDietaryPrefs = (pref) => {
    setUserStats(prev => ({
      ...prev,
      dietaryPrefs: {
        ...prev.dietaryPrefs,
        [pref]: !prev.dietaryPrefs[pref]
      }
    }));
  };

  const setFlavorMood = (mood) => {
    setUserStats(prev => ({...prev, flavorMood: mood}));
    setShowFlavorMood(false);
  };

  // Filter recipes based on dietary preferences
  const filterByDietary = (recipe) => {
    const activeFilters = Object.keys(userStats.dietaryPrefs).filter(k => userStats.dietaryPrefs[k]);
    if (activeFilters.length === 0) return true;

    for (let filter of activeFilters) {
      if (!DIETARY_FILTERS[filter]) continue;
      const excludedWords = DIETARY_FILTERS[filter].exclude;
      const recipeText = (recipe.t + " " + (recipe.i || []).join(" ") + " " + (recipe.n || []).join(" ")).toLowerCase();
      for (let word of excludedWords) {
        if (recipeText.includes(word)) return false;
      }
    }
    return true;
  };

  // Score recipes based on flavor mood
  const scoreByFlavorMood = (recipe) => {
    if (!userStats.flavorMood) return 0;
    const mood = userStats.flavorMood;
    const keywords = FLAVOR_PROFILES[mood] || [];
    const recipeText = (recipe.t + " " + (recipe.i || []).join(" ") + " " + (recipe.n || []).join(" ")).toLowerCase();
    let score = 0;
    for (let keyword of keywords) {
      if (recipeText.includes(keyword)) score += 10;
    }
    return score;
  };

  // Estimate calories for recipe
  const estimateCalories = (recipe) => {
    let calories = 0;
    const ingredients = recipe.n || [];
    for (let ing of ingredients) {
      const ingLower = ing.toLowerCase();
      for (let [key, cal] of Object.entries(CALORIE_DB)) {
        if (ingLower.includes(key)) {
          calories += cal;
          break;
        }
      }
    }
    return {min: Math.max(100, calories - 150), max: calories + 150, base: calories};
  };

  const getCalorieBadge = (calories) => {
    if (calories < 400) return {emoji: "🟢", label: "Light", class: "cal-light"};
    if (calories < 700) return {emoji: "🟡", label: "Medium", class: "cal-medium"};
    return {emoji: "🔴", label: "Hearty", class: "cal-hearty"};
  };

  const handleSearch = () => {
    if (ingredients.length === 0) {
      showToast("Add some ingredients first!");
      return;
    }
    setShowFlavorMood(true);
  };

  const proceedAfterMood = () => {
    const ingLower = ingredients.map(i => i.toLowerCase());
    let matches = recipes.filter(r => filterByDietary(r)).map(r => {
      const recipeIngs = (r.n || []).map(i => i.toLowerCase().trim());
      const matchCount = recipeIngs.filter(ri => ingLower.some(ui => ri.includes(ui) || ui.includes(ri))).length;
      const flavorBoost = scoreByFlavorMood(r);
      return {...r, matchCount, totalIngs: recipeIngs.length, flavorBoost};
    }).filter(r => r.matchCount > 0);

    // Boost recipes matching flavor mood
    if (userStats.flavorMood) {
      matches.sort((a, b) => {
        if (a.flavorBoost !== b.flavorBoost) return b.flavorBoost - a.flavorBoost;
        return b.matchCount - a.matchCount;
      });
    } else {
      matches.sort((a, b) => b.matchCount - a.matchCount);
    }

    const cuisines = {};
    matches.forEach(r => {
      if (!cuisines[r.c]) cuisines[r.c] = 0;
      cuisines[r.c]++;
    });

    const sorted = Object.entries(cuisines)
      .map(([name, count]) => ({name, count, pref: (userStats.cuisineCount[name] || 0) / Math.max(1, userStats.recipesCooked)}))
      .sort((a, b) => b.pref - a.pref || b.count - a.count);

    setSuggestedCuisines(sorted);
    setMatchedRecipes(matches);
    setResultPage(0);
    setScreen("cuisine_pick");
    setShowFlavorMood(false);
  };

  const doSearch = (cuisine) => {
    setSelectedCuisine(cuisine);
    if (cuisine === "All") {
      setMatchedRecipes(matchedRecipes);
    } else {
      setMatchedRecipes(matchedRecipes.filter(r => r.c === cuisine));
    }
    setResultPage(0);
    setScreen("results");
  };

  const cookRecipe = (recipe) => {
    const xpGain = 25 + recipe.matchCount * 5;
    const now = new Date();
    const lastDate = userStats.lastCookDate ? new Date(userStats.lastCookDate) : null;
    const dayDiff = lastDate ? Math.floor((now - lastDate) / (1000*60*60*24)) : 2;
    const newStreak = dayDiff === 1 ? userStats.streak + 1 : (dayDiff === 0 ? userStats.streak : 1);

    const updatedStats = {
      ...userStats,
      xp: userStats.xp + xpGain,
      recipesCooked: userStats.recipesCooked + 1,
      streak: newStreak,
      lastCookDate: now.toISOString(),
      cuisineCount: {...userStats.cuisineCount, [recipe.c]: (userStats.cuisineCount[recipe.c] || 0) + 1}
    };

    const currentLevel = LEVELS.findIndex(l => userStats.xp >= l.xp);
    const newLevel = LEVELS.findIndex(l => updatedStats.xp >= l.xp);

    if (newLevel > currentLevel) {
      setShowLevelUp(true);
      setTimeout(() => setShowLevelUp(false), 2000);
      for (let i = 0; i < 20; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.background = ['#7c5cfc','#ff6b6b','#ffd93d','#6bcb77'][Math.floor(Math.random()*4)];
        piece.style.animationDelay = Math.random() * 0.3 + 's';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 3000);
      }
    }

    const newBadges = [];
    BADGES.forEach(b => {
      if (!updatedStats.earnedBadges.includes(b.id) && b.check(updatedStats)) {
        newBadges.push(b.id);
      }
    });
    if (newBadges.length > 0) {
      updatedStats.earnedBadges = [...updatedStats.earnedBadges, ...newBadges];
      const badge = BADGES.find(b => b.id === newBadges[0]);
      showToast(`Earned badge: ${badge.icon} ${badge.name}`);
    }

    setUserStats(updatedStats);
    saveUserStats(updatedStats);
    showToast(`+${xpGain} XP!`);
    setScreen("results");
  };

  // ========================================
  // CHEF KISS ANIMATION COMPONENT
  // ========================================
  const ChefKissAnimation = () => {
    const [particles, setParticles] = useState([]);

    useEffect(() => {
      const interval = setInterval(() => {
        const angles = [0, 45, 90, 135, 180, 225, 270, 315];
        const newParticles = angles.map((angle, idx) => ({
          id: Date.now() + idx,
          angle,
          distance: 60 + Math.random() * 40,
          emoji: Math.random() > 0.5 ? "💋" : "✨"
        }));
        setParticles(prev => [...prev, ...newParticles].slice(-16));
      }, 1200);
      return () => clearInterval(interval);
    }, []);

    return (
      <div style={{position: 'relative', display: 'inline-block', marginBottom: 20}}>
        <div className="chef-kiss-container">
          🧑‍🍳
          <div className="kiss-mouth">👄</div>
        </div>
        {particles.map(p => {
          const tx = Math.cos((p.angle * Math.PI) / 180) * p.distance;
          const ty = Math.sin((p.angle * Math.PI) / 180) * p.distance;
          return (
            <div
              key={p.id}
              className="kiss-particle"
              style={{
                '--tx': `${tx}px`,
                '--ty': `${ty}px`,
                left: '40px',
                top: '40px'
              }}
            >
              {p.emoji}
            </div>
          );
        })}
      </div>
    );
  };

  // ========================================
  // DIETARY PREFERENCES MODAL
  // ========================================
  const DietaryPreferencesModal = () => {
    const options = [
      {key: 'vegan', name: 'Vegan', desc: 'No animal products'},
      {key: 'vegetarian', name: 'Vegetarian', desc: 'No meat'},
      {key: 'glutenFree', name: 'Gluten-Free', desc: 'No gluten'},
      {key: 'dairyFree', name: 'Dairy-Free', desc: 'No dairy'},
      {key: 'nutFree', name: 'Nut-Free', desc: 'No nuts'},
      {key: 'keto', name: 'Keto/Low-Carb', desc: 'Low carbohydrates'}
    ];

    return (
      <div className="modal-overlay" onClick={() => setShowDietaryModal(false)}>
        <div className="modal-content" style={{width: '90%', maxWidth: 400}} onClick={e => e.stopPropagation()}>
          <button className="modal-close" onClick={() => setShowDietaryModal(false)}>×</button>
          <h2 style={{fontSize: 20, fontWeight: 700, marginBottom: 16}}>Dietary Preferences</h2>
          <p style={{fontSize: 13, color: 'var(--text3)', marginBottom: 16}}>
            Select your dietary restrictions. Recipes will be filtered accordingly.
          </p>
          <div className="dietary-grid">
            {options.map(opt => (
              <label key={opt.key} className={`dietary-option ${userStats.dietaryPrefs[opt.key] ? 'selected' : ''}`}>
                <input
                  type="checkbox"
                  checked={userStats.dietaryPrefs[opt.key] || false}
                  onChange={() => updateDietaryPrefs(opt.key)}
                />
                <div className="dietary-option-text">
                  <div className="dietary-option-label">{opt.name}</div>
                  <div className="dietary-option-desc">{opt.desc}</div>
                </div>
              </label>
            ))}
          </div>
          <button
            onClick={() => setShowDietaryModal(false)}
            style={{
              width: '100%',
              padding: '12px',
              background: 'var(--primary)',
              border: 'none',
              borderRadius: 10,
              color: '#fff',
              fontWeight: 700,
              cursor: 'pointer'
            }}
          >
            Done
          </button>
        </div>
      </div>
    );
  };

  // ========================================
  // FLAVOR MOOD SELECTOR
  // ========================================
  const FlavorMoodSelector = () => {
    const moods = [
      {key: 'spicy', emoji: '🌶️', label: 'Spicy'},
      {key: 'sweet', emoji: '🍯', label: 'Sweet'},
      {key: 'savory', emoji: '🧂', label: 'Savory'},
      {key: 'tangy', emoji: '🍋', label: 'Tangy'},
      {key: 'surprise', emoji: '🤷', label: 'Surprise Me'}
    ];

    return (
      <div className="modal-overlay" onClick={() => setShowFlavorMood(false)}>
        <div className="modal-content" onClick={e => e.stopPropagation()}>
          <h2 style={{fontSize: 20, fontWeight: 700, marginBottom: 8}}>What mood are you in?</h2>
          <p style={{fontSize: 13, color: 'var(--text3)', marginBottom: 20}}>
            Choose a flavor profile to refine your recipe suggestions
          </p>
          <div className="flavor-grid">
            {moods.map(mood => (
              <button
                key={mood.key}
                className={`flavor-btn ${userStats.flavorMood === mood.key ? 'selected' : ''}`}
                onClick={() => setFlavorMood(mood.key)}
              >
                <div className="flavor-btn-emoji">{mood.emoji}</div>
                <div className="flavor-btn-label">{mood.label}</div>
              </button>
            ))}
          </div>
          <button
            onClick={proceedAfterMood}
            style={{
              width: '100%',
              padding: '14px',
              background: 'linear-gradient(135deg,var(--primary),var(--primary-light))',
              border: 'none',
              borderRadius: 10,
              color: '#fff',
              fontWeight: 700,
              fontSize: 15,
              cursor: 'pointer',
              marginTop: 16
            }}
          >
            Find Recipes
          </button>
        </div>
      </div>
    );
  };

  // ========================================
  // SCREEN RENDERS
  // ========================================

  // HOME SCREEN
  if (screen === "home") return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',padding:'20px'}}>
      {showAuthBanner && (
        <div className="auth-banner">
          ⚠️ Sign in to save your progress across devices
        </div>
      )}
      {toast && <div className="toast">{toast}</div>}
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <ChefKissAnimation />
        <h1 style={{fontSize:28,fontWeight:900,marginBottom:8}}>IngredientIQ</h1>
        <p style={{color:'var(--text3)',fontSize:14,marginBottom:20,textAlign:'center',maxWidth:200}}>
          Smart recipe matcher powered by your ingredients
        </p>

        <div style={{display:'flex',flexDirection:'column',gap:12,width:'100%',maxWidth:280}}>
          <button onClick={()=>setScreen("input")}
            style={{padding:'16px',background:'linear-gradient(135deg,var(--primary),var(--primary-light))',
              border:'none',borderRadius:14,color:'#fff',fontWeight:700,fontSize:16,cursor:'pointer',
              boxShadow:'0 8px 32px rgba(124,92,252,.3)',fontFamily:'inherit'}}>
            🥘 Start Cooking
          </button>

          {authUser ? (
            <>
              <button onClick={()=>setScreen("profile")}
                style={{padding:'14px',background:'var(--surface2)',border:'none',borderRadius:14,
                  color:'var(--text)',fontWeight:600,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>
                👤 {userStats.name} • Level {LEVELS.findIndex(l => userStats.xp >= l.xp)}
              </button>
            </>
          ) : (
            <button onClick={signInWithGoogle}
              style={{padding:'14px',background:'var(--surface2)',border:'none',borderRadius:14,
                color:'var(--text)',fontWeight:600,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>
              🔐 Sign in with Google
            </button>
          )}

          <button onClick={() => setShowDietaryModal(true)}
            style={{padding:'14px',background:'var(--surface2)',border:'none',borderRadius:14,
              color:'var(--text)',fontWeight:600,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>
            ⚙️ Dietary Preferences
          </button>

          <button onClick={()=>setScreen("profile")}
            style={{padding:'14px',background:'var(--surface2)',border:'none',borderRadius:14,
              color:'var(--text)',fontWeight:600,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>
            🏆 Profile & Badges
          </button>
        </div>

        {Object.keys(userStats.dietaryPrefs).filter(k => userStats.dietaryPrefs[k]).length > 0 && (
          <div style={{marginTop:24,width:'100%',textAlign:'center'}}>
            <p style={{fontSize:12,color:'var(--text3)',marginBottom:8}}>Active Filters:</p>
            <div style={{display:'flex',flexWrap:'wrap',justifyContent:'center',gap:6}}>
              {Object.keys(userStats.dietaryPrefs).filter(k => userStats.dietaryPrefs[k]).map(k => (
                <span key={k} className="dietary-badge">
                  {k.charAt(0).toUpperCase() + k.slice(1)}
                </span>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );

  // INPUT SCREEN
  if (screen === "input") return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      {toast && <div className="toast">{toast}</div>}
      <div style={{padding:'16px 20px',display:'flex',alignItems:'center',gap:12}}>
        <button onClick={()=>setScreen("home")} style={{background:'var(--surface2)',border:'none',
          borderRadius:10,width:36,height:36,color:'var(--text)',fontSize:18,cursor:'pointer',
          display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
        <h2 style={{fontSize:18,fontWeight:700}}>What do you have?</h2>
      </div>

      <div style={{padding:'0 20px',flex:1}}>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--text3)',marginBottom:8}}>SEARCH</div>
          <input type="text" placeholder="Type an ingredient..." value={inputValue}
            onChange={e => setInputValue(e.target.value)}
            onKeyPress={e => {if(e.key==='Enter') addIngredient(inputValue.trim());setInputValue('')}}
            style={{width:'100%',padding:'12px 16px',background:'var(--surface2)',border:'none',
              borderRadius:10,color:'var(--text)',fontSize:14,fontFamily:'inherit'}}/>
        </div>
          {/* Input Method Buttons */}
          <div style={{display:'flex',gap:8,marginTop:12,marginBottom:4}}>
            <button onClick={startDictation} disabled={isListening||imgRecognizing}
              style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'12px 8px',background:isListening?'var(--primary)':'var(--surface2)',border:'1px solid var(--surface3)',borderRadius:'var(--radius-sm)',cursor:'pointer',color:isListening?'#fff':'var(--text2)',fontSize:12,fontWeight:600,transition:'all .2s'}}>
              <span style={{fontSize:22}}>{isListening?'🔴':'🎤'}</span>
              {isListening?'Listening...':'Dictate'}
            </button>
            <label style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'12px 8px',background:imgRecognizing?'var(--primary)':'var(--surface2)',border:'1px solid var(--surface3)',borderRadius:'var(--radius-sm)',cursor:'pointer',color:imgRecognizing?'#fff':'var(--text2)',fontSize:12,fontWeight:600,transition:'all .2s'}}>
              <span style={{fontSize:22}}>{imgRecognizing?'⏳':'🖼️'}</span>
              {imgRecognizing?'Scanning...':'Upload Photo'}
              <input ref={fileInputRef} type="file" accept="image/*" style={{display:'none'}}
                onChange={(e)=>{if(e.target.files[0])recognizeFromImage(e.target.files[0]);e.target.value='';}} />
            </label>
            <label style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'12px 8px',background:'var(--surface2)',border:'1px solid var(--surface3)',borderRadius:'var(--radius-sm)',cursor:'pointer',color:'var(--text2)',fontSize:12,fontWeight:600,transition:'all .2s'}}>
              <span style={{fontSize:22}}>📸</span>
              Take Photo
              <input ref={cameraInputRef} type="file" accept="image/*" capture="environment" style={{display:'none'}}
                onChange={(e)=>{if(e.target.files[0])recognizeFromImage(e.target.files[0]);e.target.value='';}} />
            </label>
          </div>

        {ingredients.length > 0 && (
          <div style={{marginBottom:20}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--text3)',marginBottom:8}}>SELECTED ({ingredients.length})</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {ingredients.map(ing => (
                <span key={ing} className="slide-in"
                  style={{background:'var(--primary)',borderRadius:20,padding:'8px 14px',fontSize:13,
                    fontWeight:600,display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}
                  onClick={()=>removeIngredient(ing)}>
                  {ing} <span style={{opacity:.6}}>×</span>
                </span>
              ))}
            </div>
          </div>
        )}

        <div style={{marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--text3)',marginBottom:8}}>QUICK ADD</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {(() => {
              const freq = userStats.ingredientFreq || {};
              const sorted = [...COMMON_INGREDIENTS].sort((a,b) => (freq[b]||0) - (freq[a]||0));
              return sorted.filter(i => !ingredients.includes(i)).slice(0,15).map(ing => (
                <button key={ing} onClick={()=>addIngredient(ing)}
                  style={{background:'var(--surface2)',border:'none',borderRadius:20,padding:'7px 12px',
                    color:'var(--text2)',fontSize:12,fontWeight:500,cursor:'pointer',fontFamily:'inherit',
                    transition:'all .2s'}}
                  onMouseOver={e=>{e.currentTarget.style.background='var(--surface3)';e.currentTarget.style.color='var(--text)'}}
                  onMouseOut={e=>{e.currentTarget.style.background='var(--surface2)';e.currentTarget.style.color='var(--text2)'}}>
                  + {ing} {freq[ing]>0?'⭐':''}
                </button>
              ));
            })()}
          </div>
        </div>
      </div>

      <div style={{padding:'20px'}}>
        <button onClick={handleSearch}
          style={{width:'100%',padding:'16px',background:ingredients.length>0?
            'linear-gradient(135deg,var(--primary),var(--primary-light))':'var(--surface3)',
            border:'none',borderRadius:14,color:ingredients.length>0?'#fff':'var(--text3)',
            fontSize:16,fontWeight:700,cursor:ingredients.length>0?'pointer':'default',
            boxShadow:ingredients.length>0?'0 8px 32px rgba(124,92,252,.3)':'none',fontFamily:'inherit'}}>
          🔍 Find Recipes ({ingredients.length})
        </button>
      </div>

      {xpPops.map(p=><div key={p.id} className="xp-pop" style={{left:p.x-30,top:p.y}}>+{p.amount} XP</div>)}
      {showDietaryModal && <DietaryPreferencesModal />}
      {showFlavorMood && <FlavorMoodSelector />}
    </div>
  );

  // CUISINE PICKER
  if (screen === "cuisine_pick") return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      {toast && <div className="toast">{toast}</div>}
      <div style={{padding:'16px 20px',display:'flex',alignItems:'center',gap:12}}>
        <button onClick={()=>setScreen("input")} style={{background:'var(--surface2)',border:'none',
          borderRadius:10,width:36,height:36,color:'var(--text)',fontSize:18,cursor:'pointer',
          display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
        <h2 style={{fontSize:18,fontWeight:700}}>What are you craving?</h2>
      </div>

      <div style={{padding:'0 20px',flex:1}}>
        <p style={{color:'var(--text2)',fontSize:14,marginBottom:20}}>
          Based on your {ingredients.length} ingredients, here's what we can make:
        </p>

        <button onClick={()=>doSearch("All")} className="fade-up"
          style={{width:'100%',background:'linear-gradient(135deg,var(--primary-dark),var(--primary))',
            border:'none',borderRadius:14,padding:'18px 20px',marginBottom:12,cursor:'pointer',
            display:'flex',alignItems:'center',gap:14,textAlign:'left',color:'#fff'}}>
          <span style={{fontSize:32}}>🎲</span>
          <div>
            <div style={{fontWeight:700,fontSize:16}}>Surprise Me!</div>
            <div style={{fontSize:12,opacity:.7}}>All cuisines, randomized</div>
          </div>
          <span style={{marginLeft:'auto',fontSize:13,opacity:.7}}>
            {suggestedCuisines.reduce((a,c)=>a+c.count,0)} recipes
          </span>
        </button>

        {suggestedCuisines.map((c, i) => (
          <button key={c.name} onClick={()=>doSearch(c.name)}
            className="fade-up" style={{width:'100%',background:'var(--surface)',
              border:'none',borderRadius:14,padding:'16px 20px',marginBottom:8,cursor:'pointer',
              display:'flex',alignItems:'center',gap:14,textAlign:'left',color:'var(--text)',
              animationDelay:(i*0.05)+'s',transition:'background .2s'}}
            onMouseOver={e=>e.currentTarget.style.background='var(--surface2)'}
            onMouseOut={e=>e.currentTarget.style.background='var(--surface)'}>
            <span style={{fontSize:28,width:40,textAlign:'center'}}>{CUISINE_EMOJIS[c.name]||'🍴'}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:15}}>{c.name}</div>
              <div style={{fontSize:12,color:'var(--text3)'}}>{c.count} matching recipes</div>
            </div>
            {(userStats.cuisineCount[c.name]||0)>0 && (
              <span style={{fontSize:11,background:'var(--surface3)',borderRadius:8,padding:'3px 8px',
                color:'var(--text2)'}}>Cooked {userStats.cuisineCount[c.name]}x</span>
            )}
            <span style={{color:'var(--text3)',fontSize:18}}>›</span>
          </button>
        ))}
      </div>
      {xpPops.map(p=><div key={p.id} className="xp-pop" style={{left:p.x-30,top:p.y}}>+{p.amount} XP</div>)}
    </div>
  );

  // RESULTS SCREEN
  if (screen === "results") {
    const pageSize = 3;
    const pageRecipes = matchedRecipes.slice(resultPage * pageSize, (resultPage+1) * pageSize);
    const hasMore = (resultPage+1) * pageSize < matchedRecipes.length;

    return (
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
        {toast && <div className="toast">{toast}</div>}
        <div style={{padding:'16px 20px',display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>setScreen("cuisine_pick")} style={{background:'var(--surface2)',border:'none',
            borderRadius:10,width:36,height:36,color:'var(--text)',fontSize:18,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
          <div>
            <h2 style={{fontSize:18,fontWeight:700}}>
              {selectedCuisine==="All"?"All Recipes":selectedCuisine} {CUISINE_EMOJIS[selectedCuisine]||'🎲'}
            </h2>
            <p style={{fontSize:12,color:'var(--text3)'}}>
              {matchedRecipes.length} matches found
            </p>
          </div>
        </div>

        {userStats.flavorMood && (
          <div style={{padding:'0 20px',marginBottom:12}}>
            <span className="dietary-badge">
              Mood: {userStats.flavorMood.charAt(0).toUpperCase() + userStats.flavorMood.slice(1)}
            </span>
          </div>
        )}

        <div style={{padding:'0 20px',flex:1}}>
          {pageRecipes.length === 0 ? (
            <div style={{textAlign:'center',padding:40}}>
              <div style={{fontSize:48,marginBottom:12}}>😅</div>
              <p style={{color:'var(--text2)'}}>No recipes found. Try different ingredients!</p>
            </div>
          ) : (
            pageRecipes.map((r, i) => {
              const cals = estimateCalories(r);
              const badge = getCalorieBadge(cals.base);
              return (
                <div key={r.t+i} className="fade-up" style={{animationDelay:(i*0.1)+'s',
                  background:'var(--surface)',borderRadius:16,padding:18,marginBottom:12,
                  cursor:'pointer',transition:'transform .2s'}}
                  onClick={()=>{setCurrentRecipe(r);setScreen("recipe")}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,fontWeight:700,color:CUISINE_COLORS[r.c]||'#888',
                        textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>
                        {CUISINE_EMOJIS[r.c]||'🍴'} {r.c}
                      </div>
                      <h3 style={{fontSize:16,fontWeight:700,lineHeight:1.3}}>{r.t}</h3>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:8,marginLeft:12,alignItems:'flex-end'}}>
                      <div style={{background:'var(--surface2)',borderRadius:10,padding:'6px 10px',
                        textAlign:'center',minWidth:50}}>
                        <div style={{fontSize:18,fontWeight:800,color:'var(--accent3)'}}>{r.matchCount}</div>
                        <div style={{fontSize:9,color:'var(--text3)'}}>of {r.totalIngs}</div>
                      </div>
                      <div className={`cal-badge ${badge.class}`}>
                        {badge.emoji} {cals.base} cal
                      </div>
                    </div>
                  </div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                    {(r.n||[]).slice(0,8).map(ing => {
                      const matched = ingredients.some(ui => ing.includes(ui) || ui.includes(ing));
                      return (
                        <span key={ing} style={{fontSize:11,padding:'3px 8px',borderRadius:6,fontWeight:500,
                          background:matched?'rgba(107,203,119,.15)':'var(--surface2)',
                          color:matched?'var(--accent3)':'var(--text3)',
                          border:matched?'1px solid rgba(107,203,119,.3)':'1px solid transparent'}}>
                          {matched?'✓ ':''}{ing}
                        </span>
                      );
                    })}
                  </div>
                </div>
              );
            })
          )}

          {(hasMore || resultPage > 0) && (
            <div style={{display:'flex',gap:8,justifyContent:'center',padding:'16px 0'}}>
              {resultPage > 0 && (
                <button onClick={()=>setResultPage(p=>p-1)}
                  style={{background:'var(--surface2)',border:'none',borderRadius:10,padding:'10px 20px',
                    color:'var(--text)',fontSize:13,fontWeight:600,cursor:'pointer'}}>
                  ← Previous
                </button>
              )}
              {hasMore && (
                <button onClick={()=>setResultPage(p=>p+1)}
                  style={{background:'var(--primary)',border:'none',borderRadius:10,padding:'10px 20px',
                    color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',
                    boxShadow:'0 4px 16px rgba(124,92,252,.3)'}}>
                  Show More →
                </button>
              )}
            </div>
          )}
        </div>
        {xpPops.map(p=><div key={p.id} className="xp-pop" style={{left:p.x-30,top:p.y}}>+{p.amount} XP</div>)}
      </div>
    );
  }

  // RECIPE DETAIL
  if (screen === "recipe" && currentRecipe) {
    const r = currentRecipe;
    const cals = estimateCalories(r);
    const badge = getCalorieBadge(cals.base);
    return (
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
        {toast && <div className="toast">{toast}</div>}
        <div style={{padding:'16px 20px',display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>setScreen("results")} style={{background:'var(--surface2)',border:'none',
            borderRadius:10,width:36,height:36,color:'var(--text)',fontSize:18,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
          <span style={{fontSize:12,color:'var(--text3)',fontWeight:600}}>
            {CUISINE_EMOJIS[r.c]} {r.c}
          </span>
        </div>

        <div style={{padding:'0 20px 32px'}}>
          <h2 className="fade-up" style={{fontSize:22,fontWeight:800,marginBottom:16,lineHeight:1.3}}>{r.t}</h2>

          <div className="fade-up" style={{background:'var(--surface)',borderRadius:14,padding:16,marginBottom:16,
            display:'flex',alignItems:'center',gap:14,animationDelay:'.1s'}}>
            <div style={{width:50,height:50,borderRadius:12,background:'linear-gradient(135deg,var(--accent3),#2ecc71)',
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:800}}>
              {r.matchCount}/{r.totalIngs}
            </div>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>Ingredient Match</div>
              <div style={{fontSize:12,color:'var(--text3)'}}>
                You have {r.matchCount} of {r.totalIngs} ingredients needed
              </div>
            </div>
          </div>

          <div className="fade-up" style={{background:'var(--surface)',borderRadius:14,padding:16,marginBottom:16,
            animationDelay:'.15s'}}>
            <h3 style={{fontSize:14,fontWeight:700,marginBottom:12,color:'var(--text2)'}}>📊 Nutrition</h3>
            <div style={{display:'flex',gap:12,alignItems:'center'}}>
              <div className={`cal-badge ${badge.class}`} style={{fontSize:12}}>
                {badge.emoji} {badge.label}
              </div>
              <div style={{fontSize:13,color:'var(--text2)'}}>
                ~{cals.min}-{cals.max} calories
              </div>
            </div>
          </div>

          <div className="fade-up" style={{background:'var(--surface)',borderRadius:14,padding:16,marginBottom:16,
            animationDelay:'.2s'}}>
            <h3 style={{fontSize:14,fontWeight:700,marginBottom:12,color:'var(--text2)'}}>🥘 Ingredients</h3>
            {(r.i||[]).map((ing, i) => {
              const matched = ingredients.some(ui => ing.toLowerCase().includes(ui));
              return (
                <div key={i} style={{display:'flex',fontSize:13,padding:'8px 0',
                  borderBottom:'1px solid var(--surface2)',color:matched?'var(--accent3)':'var(--text2)'}}>
                  {matched && <span style={{marginRight:8}}>✓</span>}
                  {ing}
                </div>
              );
            })}
          </div>

          <div className="fade-up" style={{background:'var(--surface)',borderRadius:14,padding:16,marginBottom:16,
            animationDelay:'.25s'}}>
            <h3 style={{fontSize:14,fontWeight:700,marginBottom:12,color:'var(--text2)'}}>👨‍🍳 Instructions</h3>
            <p style={{fontSize:13,lineHeight:1.6,color:'var(--text2)'}}>{r.inst}</p>
          </div>
        </div>

        <div style={{padding:'20px',paddingBottom:32}}>
          <button onClick={()=>cookRecipe(r)}
            style={{width:'100%',padding:'16px',background:'linear-gradient(135deg,var(--accent3),#2ecc71)',
              border:'none',borderRadius:14,color:'#000',fontSize:16,fontWeight:700,cursor:'pointer',
              boxShadow:'0 8px 32px rgba(107,203,119,.3)',fontFamily:'inherit'}}>
            ✅ I Cooked This!
          </button>
        </div>
        {xpPops.map(p=><div key={p.id} className="xp-pop" style={{left:p.x-30,top:p.y}}>+{p.amount} XP</div>)}
      </div>
    );
  }

  // PROFILE SCREEN
  if (screen === "profile") return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      {toast && <div className="toast">{toast}</div>}
      <div style={{padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button onClick={()=>setScreen("home")} style={{background:'var(--surface2)',border:'none',
          borderRadius:10,width:36,height:36,color:'var(--text)',fontSize:18,cursor:'pointer',
          display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
        <h2 style={{fontSize:18,fontWeight:700}}>Profile</h2>
        <div style={{width:36}}></div>
      </div>

      <div style={{padding:'0 20px',flex:1}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          {authUser?.user_metadata?.avatar_url && (
            <img src={authUser.user_metadata.avatar_url} alt="avatar"
              style={{width:80,height:80,borderRadius:'50%',marginBottom:12}}/>
          )}
          <h3 style={{fontSize:18,fontWeight:700,marginBottom:4}}>{userStats.name}</h3>
          <p style={{fontSize:14,color:'var(--text3)'}}>{LEVELS[LEVELS.findIndex(l => userStats.xp >= l.xp)].name}</p>
        </div>

        <div style={{background:'var(--surface)',borderRadius:14,padding:16,marginBottom:16}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
            <div>
              <div style={{fontSize:11,color:'var(--text3)',fontWeight:700,marginBottom:4}}>LEVEL</div>
              <div style={{fontSize:24,fontWeight:900,color:'var(--primary)'}}>
                {LEVELS.findIndex(l => userStats.xp >= l.xp)}
              </div>
            </div>
            <div>
              <div style={{fontSize:11,color:'var(--text3)',fontWeight:700,marginBottom:4}}>TOTAL XP</div>
              <div style={{fontSize:24,fontWeight:900,color:'var(--accent2)'}}>{userStats.xp}</div>
            </div>
            <div>
              <div style={{fontSize:11,color:'var(--text3)',fontWeight:700,marginBottom:4}}>STREAK 🔥</div>
              <div style={{fontSize:24,fontWeight:900,color:'var(--accent)'}}>{userStats.streak}</div>
            </div>
            <div>
              <div style={{fontSize:11,color:'var(--text3)',fontWeight:700,marginBottom:4}}>RECIPES</div>
              <div style={{fontSize:24,fontWeight:900,color:'var(--accent3)'}}>{userStats.recipesCooked}</div>
            </div>
          </div>

          <div style={{fontSize:12,color:'var(--text2)'}}>
            <div style={{fontWeight:700,marginBottom:6}}>Next Level Progress</div>
            <div style={{background:'var(--surface2)',height:8,borderRadius:4,overflow:'hidden'}}>
              <div style={{height:'100%',width:(userStats.xp % 100) + '%',background:'var(--primary)',transition:'width .3s'}}></div>
            </div>
          </div>
        </div>

        <div style={{background:'var(--surface)',borderRadius:14,padding:16,marginBottom:16}}>
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:12}}>🍜 Top Cuisines</h3>
          {Object.entries(userStats.cuisineCount || {}).sort((a,b) => b[1] - a[1]).slice(0,5).map(([c, count]) => (
            <div key={c} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',
              fontSize:13,borderBottom:'1px solid var(--surface2)',color:'var(--text2)'}}>
              <span>{CUISINE_EMOJIS[c]||'🍴'} {c}</span>
              <span style={{fontWeight:600}}>{count} dishes</span>
            </div>
          ))}
        </div>

        <button onClick={()=>setScreen("badges")}
          style={{width:'100%',padding:'14px',background:'var(--surface)',border:'none',borderRadius:14,
            color:'var(--text)',fontWeight:600,fontSize:14,cursor:'pointer',marginBottom:16,fontFamily:'inherit'}}>
          🏅 View All Badges ({userStats.earnedBadges?.length || 0})
        </button>

        {authUser && (
          <button onClick={signOut}
            style={{width:'100%',padding:'14px',background:'var(--accent)',border:'none',borderRadius:14,
              color:'#fff',fontWeight:600,fontSize:14,cursor:'pointer',fontFamily:'inherit'}}>
            🚪 Sign Out
          </button>
        )}
      </div>
      {xpPops.map(p=><div key={p.id} className="xp-pop" style={{left:p.x-30,top:p.y}}>+{p.amount} XP</div>)}
    </div>
  );

  // BADGES SCREEN
  if (screen === "badges") return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      {toast && <div className="toast">{toast}</div>}
      <div style={{padding:'16px 20px',display:'flex',alignItems:'center',gap:12}}>
        <button onClick={()=>setScreen("profile")} style={{background:'var(--surface2)',border:'none',
          borderRadius:10,width:36,height:36,color:'var(--text)',fontSize:18,cursor:'pointer',
          display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
        <h2 style={{fontSize:18,fontWeight:700}}>Badges</h2>
      </div>

      <div style={{padding:'0 20px 32px',flex:1}}>
        {BADGES.map((b, i) => {
          const earned = userStats.earnedBadges?.includes(b.id);
          return (
            <div key={b.id} className="fade-up" style={{animationDelay:(i*0.05)+'s',
              background:earned?'var(--surface)':'var(--surface2)',borderRadius:14,padding:16,
              marginBottom:12,opacity:earned?1:0.5,transition:'all .2s'}}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div style={{fontSize:32,opacity:earned?1:0.5}}>{b.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{b.name}</div>
                  <div style={{fontSize:12,color:'var(--text3)'}}>{b.desc}</div>
                </div>
                {earned && <span style={{fontSize:20}}>✓</span>}
              </div>
            </div>
          );
        })}
      </div>
      {xpPops.map(p=><div key={p.id} className="xp-pop" style={{left:p.x-30,top:p.y}}>+{p.amount} XP</div>)}
    </div>
  );

  return <div style={{padding:20,textAlign:'center',color:'var(--text3)'}}>Loading...</div>;
}

ReactDOM.render(<IngredientIQ />, document.getElementById('root'));
</script>
</body>
</html>
